site_name: FINSABER
site_description: Package-oriented financial backtesting framework for price, news, filings, and extensible market data.
site_url: https://waylonli.github.io/FINSABER/
repo_url: https://github.com/waylonli/FINSABER
repo_name: waylonli/FINSABER

theme:
  name: material
  logo: assets/finsaber-logo-light.png
  favicon: assets/finsaber-logo-light.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: teal

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Get Started:
      - Installation: installation.md
      - Backtesting Concepts: concepts.md
      - Quick Start: quickstart.md
      - Configuration: configuration.md
      - Examples: examples.md
  - Framework:
      - Architecture: architecture.md
      - Data: data.md
      - Strategies: strategies.md
      - Execution Model: execution.md
  - Evaluation:
      - Results: results.md
      - Validation: validation.md
      - FinAgent Reproduction: finagent-reproduction.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
